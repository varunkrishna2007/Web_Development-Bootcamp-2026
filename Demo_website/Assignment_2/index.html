<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varunsingh's To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="Intro"><h1>Hello everyone, my name is Varunsingh Jamadar. I love coding and music.</h1>
    <p>This is a simple to-do list app using HTML, CSS and JS</p>
    <img src="avatar" alt="HTML" width="200" height="200"></div>
    <div id="taskdiv">

    </div>
 <script src="script.js"></script>
